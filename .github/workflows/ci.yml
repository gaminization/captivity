name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  test:
    name: CI / test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: pylint src/captivity --disable=all --enable=E --exit-zero

      - name: Run tests with coverage
        run: pytest --cov=captivity --cov-report=xml --cov-report=term -q

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage.xml

      - name: Register check via GitHub API
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "CI / test",
              head_sha: context.sha,
              status: "completed",
              conclusion: "${{ job.status }}",
              output: {
                title: "CI ${{ job.status }}",
                summary: "Tests completed with status: ${{ job.status }}"
              }
            });
