repos:
-   repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
    -   id: black
-   repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.0
    hooks:
    -   id: ruff
        args: [--fix]
-   repo: local
    hooks:
    -   id: check-docs-drift
        name: Check CLI Docs Drift
        entry: ./scripts/check_docs_drift.sh
        language: script
        pass_filenames: false
